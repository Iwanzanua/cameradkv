<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster AI Prompt Generator - SMK Muhlibat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
        #imagePreview { max-width: 100%; height: auto; border-radius: 8px; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto py-10 px-4">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="gradient-bg p-6 text-white text-center">
                <h1 class="text-2xl font-bold">SMK Muhammadiyah 5 Babat</h1>
                <p class="text-blue-100">Poster AI Prompt Generator - Sekolah Pusat Keunggulan</p>
            </div>

            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">1. Upload Foto Utama (Akan jadi bagian dari poster):</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="previewContainer" class="mt-4 hidden">
                        <p class="text-xs text-gray-500 mb-2">Preview Foto yang akan diproses AI:</p>
                        <img id="imagePreview" src="#" alt="Preview">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">2. Deskripsikan Apa yang Terjadi di Foto Tersebut:</label>
                    <textarea id="themeInput" rows="3" placeholder="Contoh: Seorang siswa DKV sedang memegang kamera film di depan komputer editing..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"></textarea>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">3. Jumlah Varian Referensi:</label>
                    <select id="countInput" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="1">1 Poster</option>
                        <option value="3" selected>3 Poster (Rekomendasi)</option>
                        <option value="5">5 Poster</option>
                    </select>
                </div>

                <button onclick="generatePrompt()" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition shadow-md">
                    Buat Prompt & Deskripsi Poster
                </button>

                <div id="resultSection" class="hidden space-y-4">
                    <hr>
                    <div class="flex justify-between items-center">
                        <h2 class="text-lg font-bold text-gray-800">Prompt Untuk AI Gambar:</h2>
                        <button onclick="copyToClipboard()" class="text-sm text-blue-600 hover:underline">Salin Semua</button>
                    </div>
                    <div id="promptOutput" class="space-y-4"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Preview Gambar
        document.getElementById('imageInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('imagePreview').src = URL.createObjectURL(file);
            }
        }

        function generatePrompt() {
            const context = document.getElementById('themeInput').value || "Siswa sedang berkegiatan praktik";
            const count = parseInt(document.getElementById('countInput').value);
            const outputArea = document.getElementById('promptOutput');
            const resultSection = document.getElementById('resultSection');
            
            outputArea.innerHTML = '';
            resultSection.classList.remove('hidden');

            const schoolInfo = "SMK Muhammadiyah 5 Babat (SMK Muhlibat), Sekolah Pusat Keunggulan, Terakreditasi A.";
            
            const styles = [
                "Cinematic lighting, high resolution, 8k, professional photography style, clean layout.",
                "Modern digital design, tech-inspired overlays, vibrant corporate blue and gold accents.",
                "Futuristic classroom aesthetic, subtle motion blur, sharp focus on the subject.",
                "Clean minimalist composition, bold typography, soft bokeh background.",
                "Energetic youth vibe, dynamic angles, high contrast, studio lighting."
            ];

            for (let i = 0; i < count; i++) {
                let prompt = `[PROMPT POSTER REFERENSI ${i+1}]\n`;
                prompt += `Integrasikan foto yang diunggah (deskripsi: ${context}) ke dalam sebuah poster profesional untuk ${schoolInfo}\n\n`;
                prompt += `Elemen Wajib: Teks utama 'SMK Muhammadiyah 5 Babat', logo sekolah, dan slogan 'Sekolah Pusat Keunggulan'.\n`;
                prompt += `Deskripsi Visual: Jadikan subjek dalam foto sebagai titik fokus utama. Tambahkan elemen grafis modern yang melambangkan kemajuan teknologi dan pendidikan Islam modern.\n`;
                prompt += `Style: ${styles[i % styles.length]}`;

                const div = document.createElement('div');
                div.className = "p-4 bg-gray-50 border-l-4 border-blue-500 text-sm text-gray-700 font-mono whitespace-pre-wrap";
                div.innerText = prompt;
                outputArea.appendChild(div);
            }
        }

        function copyToClipboard() {
            const prompts = document.getElementById('promptOutput').innerText;
            navigator.clipboard.writeText(prompts);
            alert("Prompt berhasil disalin! Silakan tempelkan ke AI Generator.");
        }
    </script>
</body>
</html>
