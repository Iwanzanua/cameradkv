<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poster AI Prompt Generator - SMK Muhlibat</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gradient-bg { background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%); }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-sans">

    <div class="max-w-3xl mx-auto py-10 px-4">
        <div class="bg-white rounded-xl shadow-lg overflow-hidden">
            <div class="gradient-bg p-6 text-white text-center">
                <h1 class="text-2xl font-bold">SMK Muhammadiyah 5 Babat</h1>
                <p class="text-blue-100">Poster AI Prompt Generator - Sekolah Pusat Keunggulan</p>
            </div>

            <div class="p-6 space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Upload Gambar Pendukung (Gedung/Siswa):</label>
                    <input type="file" id="imageInput" accept="image/*" class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                    <div id="previewContainer" class="mt-4 hidden">
                        <img id="imagePreview" src="#" alt="Preview" class="rounded-lg max-h-48 mx-auto shadow">
                    </div>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Tema Poster:</label>
                    <input type="text" id="themeInput" placeholder="Contoh: Digital Masa Depan, Modern Minimalist..." class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                </div>

                <div>
                    <label class="block text-sm font-semibold text-gray-700 mb-2">Jumlah Varian Referensi:</label>
                    <select id="countInput" class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                        <option value="1">1 Poster</option>
                        <option value="3">3 Poster (Rekomendasi)</option>
                        <option value="5">5 Poster</option>
                    </select>
                </div>

                <button onclick="generatePrompt()" class="w-full gradient-bg text-white font-bold py-3 rounded-lg hover:opacity-90 transition shadow-md">
                    Buat Prompt Poster
                </button>

                <div id="resultSection" class="hidden space-y-4">
                    <hr>
                    <h2 class="text-lg font-bold text-gray-800">Hasil Prompt Untuk AI:</h2>
                    <div id="promptOutput" class="space-y-4"></div>
                    <button onclick="copyToClipboard()" class="text-sm text-blue-600 hover:underline">Salin Semua Prompt</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Preview Gambar
        document.getElementById('imageInput').onchange = function (evt) {
            const [file] = this.files;
            if (file) {
                document.getElementById('previewContainer').classList.remove('hidden');
                document.getElementById('imagePreview').src = URL.createObjectURL(file);
            }
        }

        function generatePrompt() {
            const theme = document.getElementById('themeInput').value || "Modern dan Professional";
            const count = parseInt(document.getElementById('countInput').value);
            const outputArea = document.getElementById('promptOutput');
            const resultSection = document.getElementById('resultSection');
            
            outputArea.innerHTML = '';
            resultSection.classList.remove('hidden');

            const baseDesc = "Poster pendidikan untuk SMK Muhammadiyah 5 Babat (SMK Muhlibat). Sekolah ini adalah Pusat Keunggulan (Center of Excellence) dan Terakreditasi A. ";
            
            const styles = [
                "Cinematic lighting, high resolution, 8k, clean layout, typography bold.",
                "Minimalist vector style, flat design, vibrant corporate colors.",
                "Futuristic tech style, neon blue accents, 3D elements, hyper-realistic.",
                "Soft focus background, focus on happy students, professional photography style.",
                "Dynamic composition, motion blur effects, youthful and energetic vibe."
            ];

            for (let i = 0; i < count; i++) {
                let prompt = `[POSTER REFERENSI ${i+1}]\n`;
                prompt += `Visual: ${baseDesc} Tema: ${theme}. Sertakan teks utama 'SMK Muhammadiyah 5 Babat' dan slogan 'Sekolah Pusat Keunggulan'. `;
                prompt += `Detail: Gunakan elemen desain yang melambangkan kemajuan teknologi dan pendidikan Islam modern. `;
                prompt += `Style: ${styles[i % styles.length]}`;

                const div = document.createElement('div');
                div.className = "p-4 bg-gray-50 border-l-4 border-blue-500 text-sm text-gray-700 font-mono whitespace-pre-wrap";
                div.innerText = prompt;
                outputArea.appendChild(div);
            }
        }

        function copyToClipboard() {
            const prompts = document.getElementById('promptOutput').innerText;
            navigator.clipboard.writeText(prompts);
            alert("Prompt berhasil disalin!");
        }
    </script>
</body>
</html>
