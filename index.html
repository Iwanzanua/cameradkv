<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKV MUHLIBAT - Ultra Cam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; margin: 0; overflow: hidden; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Video Full Screen */
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        video { width: 100%; height: 100%; object-fit: cover; background: #111; }

        /* Floating Info (ID & Stats) */
        #floating-info { 
            position: fixed; top: 15px; left: 15px; z-index: 100; 
            background: rgba(0,0,0,0.7); padding: 10px; border-radius: 8px; border-left: 4px solid #00ff88;
        }
        .id-label { font-size: 20px; font-weight: bold; color: #00ff88; }
        .stat-line { font-size: 11px; font-family: monospace; color: #aaa; margin-top: 5px; }

        /* Audio Monitor */
        .audio-wrapper { margin-top: 8px; }
        .audio-text { font-size: 10px; color: #00ff88; margin-bottom: 2px; }
        .audio-bar-bg { width: 100px; height: 4px; background: #333; border-radius: 2px; }
        #audio-bar-fill { height: 100%; width: 0%; background: #00ff88; transition: 0.1s; }

        /* UI Panels */
        .panel { 
            position: relative; z-index: 50; background: #1a1a1a; 
            padding: 25px; border-radius: 15px; width: 300px; 
            margin: 100px auto; text-align: center; border: 1px solid #333;
        }
        .btn { width: 100%; padding: 12px; margin: 5px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; }
        .btn-blue { background: #3498db; color: white; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-dark { background: #444; color: white; font-size: 11px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; }

        /* Floating Control Button */
        #cam-controls { position: fixed; bottom: 20px; right: 20px; z-index: 100; display: flex; flex-direction: column; gap: 10px; }
    </style>
</head>
<body>

<div id="floating-info" class="hidden">
    <div class="id-label">ID: <span id="my-id-text">----</span></div>
    <div class="stat-line" id="stat-speed">SPEED: 0 kbps</div>
    <div class="audio-wrapper">
        <div class="audio-text">AUDIO MONITOR</div>
        <div class="audio-bar-bg"><div id="audio-bar-fill"></div></div>
    </div>
</div>

<div id="menu" class="panel">
    <h3>DKV MUHLIBAT LIVE</h3>
    <button class="btn btn-red" onclick="startApp('cam')">MODE KAMERAMEN</button>
    <button class="btn btn-blue" onclick="startApp('op')">MODE OPERATOR</button>
</div>

<div id="ui-op" class="panel hidden">
    <h3>HUBUNGKAN KE HP</h3>
    <input type="text" id="target-id" placeholder="Masukkan 4 Digit Kode" maxlength="4">
    <button class="btn btn-blue" id="btn-conn" onclick="connectToCam()">CONNECT</button>
</div>

<div id="cam-controls" class="hidden">
    <button class="btn btn-dark" onclick="flipCamera()">GANTI KAMERA</button>
    <button class="btn btn-dark" onclick="toggleUIPanel()">TUTUP MENU</button>
</div>

<div id="video-container">
    <video id="v-main" autoplay playsinline muted></video>
</div>

<script>
    let peer = null, localStream = null, lastBytes = 0, currentFacing = "environment";
    const vMain = document.getElementById('v-main');
    const iceCfg = { iceServers: [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] };

    async function startApp(role) {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('floating-info').classList.remove('hidden');

        if(role === 'cam') {
            const id = localStorage.getItem('dkv_id') || Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('dkv_id', id);
            document.getElementById('my-id-text').innerText = id;
            document.getElementById('cam-controls').classList.remove('hidden');

            peer = new Peer('dkv-' + id, { config: iceCfg });
            await setupCamera();

            peer.on('call', call => {
                call.answer(localStream);
                startMonitoring(call.peerConnection, localStream);
            });
        } else {
            document.getElementById('ui-op').classList.remove('hidden');
            vMain.muted = false;
            peer = new Peer({ config: iceCfg });
        }
    }

    async function setupCamera() {
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { facingMode: currentFacing, height: { ideal: 720 } },
                audio: true
            });
            vMain.srcObject = localStream;
            startMonitoring(null, localStream);
        } catch(e) { alert("Akses Kamera Gagal! Gunakan HTTPS."); }
    }

    function flipCamera() {
        currentFacing = (currentFacing === "environment") ? "user" : "environment";
        setupCamera();
    }

    function connectToCam() {
        const tid = document.getElementById('target-id').value;
        const call = peer.call('dkv-' + tid, new MediaStream());
        
        document.getElementById('btn-conn').innerText = "Connecting...";
        
        call.on('stream', stream => {
            vMain.srcObject = stream;
            document.getElementById('ui-op').classList.add('hidden');
            document.getElementById('my-id-text').innerText = tid;
            startMonitoring(call.peerConnection, stream);
        });

        setTimeout(() => {
            if(document.getElementById('btn-conn').innerText === "Connecting...") {
                alert("Gagal terhubung. Pastikan HP Kameramen sudah Standby.");
                document.getElementById('btn-conn').innerText = "CONNECT";
            }
        }, 7000);
    }

    function startMonitoring(pc, stream) {
        // Audio Monitor Logic
        const ctx = new AudioContext();
        const src = ctx.createMediaStreamSource(stream);
        const ana = ctx.createAnalyser();
        src.connect(ana);
        const data = new Uint8Array(ana.frequencyBinCount);

        function frame() {
            ana.getByteFrequencyData(data);
            let avg = data.reduce((a,b) => a+b) / data.length;
            document.getElementById('audio-bar-fill').style.width = Math.min(avg * 3, 100) + "%";
            requestAnimationFrame(frame);
        }
        frame();

        // Speed Logic (Fix 0 kbps)
        if(pc) {
            setInterval(async () => {
                const stats = await pc.getStats();
                stats.forEach(report => {
                    if (report.type === 'inbound-rtp' || report.type === 'outbound-rtp') {
                        if (report.kind === 'video') {
                            const bytes = report.bytesReceived || report.bytesSent;
                            const speed = Math.floor((bytes - lastBytes) * 8 / 1000);
                            if(speed >= 0) document.getElementById('stat-speed').innerText = `SPEED: ${speed} kbps`;
                            lastBytes = bytes;
                        }
                    }
                });
            }, 1000);
        }
    }

    function toggleUIPanel() {
        document.getElementById('cam-controls').classList.toggle('hidden');
        document.getElementById('floating-info').classList.toggle('hidden');
    }
</script>
</body>
</html>
