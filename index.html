<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>DKV LIVE LINK</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:#fff;
text-align:center;
}
video{
width:100%;
height:100vh;
object-fit:cover;
background:#000;
}
.panel{
position:fixed;
top:20px;
left:20px;
z-index:10;
background:rgba(0,0,0,.75);
padding:15px;
border-radius:12px;
width:320px;
}
input,button{
width:100%;
padding:12px;
margin:5px 0;
font-size:17px;
border:none;
border-radius:8px;
box-sizing:border-box;
}
input{background:#222;color:#fff;}
button{background:#00c853;color:#fff;font-weight:bold;cursor:pointer;}
#status{margin-top:10px;color:#00ff99;font-size:14px;}
.small{font-size:12px;color:#ccc;word-break:break-all;}
</style>
</head>
<body>

<div class="panel">

<h2>DKV LIVE PRO</h2>

<button onclick="startCam()">📷 Kamera HP</button>

<input id="room" placeholder="Masukkan kode room">

<button onclick="joinRoom()">🎬 Operator / vMix</button>

<div id="status">READY</div>
<div class="small" id="linkbox"></div>

</div>

<video id="video" autoplay playsinline muted></video>

<script>

const SIGNAL_SERVER = "https://yourdomain.com"; // ganti domain server nodejs
const socket = io(SIGNAL_SERVER,{transports:["websocket"]});

const video = document.getElementById("video");
const statusBox = document.getElementById("status");
const linkbox = document.getElementById("linkbox");

let pc;
let localStream;
let room = "";

const config = {
iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{
urls:"turn:openrelay.metered.ca:80",
username:"openrelayproject",
credential:"openrelayproject"
}
]
};

function log(txt){
statusBox.innerText = txt;
}

function newPeer(){
pc = new RTCPeerConnection(config);

pc.onicecandidate = e=>{
if(e.candidate){
socket.emit("signal",{
room:room,
data:{candidate:e.candidate}
});
}
};

pc.ontrack = e=>{
video.srcObject = e.streams[0];
video.muted = false;
};

pc.onconnectionstatechange = ()=>{
log("STATUS : " + pc.connectionState);
};
}

async function startCam(){

room = Math.floor(1000 + Math.random()*9000).toString();

newPeer();

log("Aktifkan kamera...");

localStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:1280,
height:720
},
audio:true
});

video.srcObject = localStream;

localStream.getTracks().forEach(track=>{
pc.addTrack(track,localStream);
});

socket.emit("join",room);

const link = location.origin + location.pathname + "?room=" + room;

linkbox.innerHTML =
"ROOM : "+room+"<br><br>" +
"LINK COPY:<br>"+link;

log("Menunggu operator...");
}

async function joinRoom(){

room = document.getElementById("room").value.trim();

if(!room){
alert("Masukkan kode room");
return;
}

newPeer();

socket.emit("join",room);

log("Menghubungkan...");

const offer = await pc.createOffer();
await pc.setLocalDescription(offer);

socket.emit("signal",{
room:room,
data:{offer:offer}
});
}

socket.on("signal", async msg=>{

if(!pc) return;

if(msg.offer){

await pc.setRemoteDescription(new RTCSessionDescription(msg.offer));

const answer = await pc.createAnswer();

await pc.setLocalDescription(answer);

socket.emit("signal",{
room:room,
data:{answer:answer}
});

log("Mengirim jawaban...");
}

if(msg.answer){

await pc.setRemoteDescription(new RTCSessionDescription(msg.answer));

log("CONNECTED ✅");
}

if(msg.candidate){

try{
await pc.addIceCandidate(new RTCIceCandidate(msg.candidate));
}catch(e){}
}

});

window.onload = ()=>{
const url = new URLSearchParams(location.search);
const r = url.get("room");
if(r){
document.getElementById("room").value = r;
}
};

</script>
</body>
</html>
