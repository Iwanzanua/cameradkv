<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKV NINJA - MUHLIBAT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #eee; margin: 0; overflow: hidden; display: flex; flex-direction: column; height: 100vh; }
        .hidden { display: none !important; }
        
        /* Video Styling */
        #video-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }

        /* UI Overlays */
        .overlay { position: relative; z-index: 10; background: rgba(15, 15, 15, 0.9); padding: 25px; border-radius: 12px; width: 320px; border: 1px solid #333; text-align: center; margin: auto; }
        .id-badge { font-size: 45px; font-weight: 800; color: #00ff88; margin: 15px 0; letter-spacing: 3px; text-shadow: 0 0 10px rgba(0,255,136,0.3); }
        
        /* Controls */
        .btn { width: 100%; padding: 14px; margin: 8px 0; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 14px; }
        .btn-primary { background: #3b82f6; color: white; }
        .btn-danger { background: #ef4444; color: white; }
        .btn-ghost { background: rgba(255,255,255,0.1); color: white; font-size: 11px; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; background: #222; color: white; border: 1px solid #444; box-sizing: border-box; }

        /* Status & Monitoring */
        .monitor { position: fixed; top: 15px; left: 15px; z-index: 20; background: rgba(0,0,0,0.7); padding: 12px; border-radius: 8px; font-size: 12px; pointer-events: none; }
        .audio-meter { width: 120px; height: 6px; background: #333; border-radius: 3px; overflow: hidden; margin-top: 5px; }
        #audio-bar { height: 100%; width: 0%; background: #00ff88; transition: 0.1s; }
        .status-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    </style>
</head>
<body>

<div id="mon" class="monitor hidden">
    <div style="margin-bottom: 5px;"><span id="dot" class="status-dot" style="background: #aaa;"></span> <span id="stat-text">Standby</span></div>
    <div id="stat-speed" style="color: #00ff88; font-family: monospace;">Speed: 0 kbps</div>
    <div class="audio-meter"><div id="audio-bar"></div></div>
    <button class="btn btn-ghost" style="margin-top:10px; pointer-events: auto;" id="btn-mute" onclick="toggleMute()">MUTE AUDIO</button>
</div>

<div id="menu" class="overlay">
    <h2 style="margin-top:0; color:#3b82f6;">DKV NINJA</h2>
    <button class="btn btn-primary" onclick="initRole('cam')">KAMERAMEN (HP)</button>
    <button class="btn btn-primary" onclick="initRole('op')">OPERATOR (VMIX)</button>
</div>

<div id="ui-cam" class="overlay hidden">
    <p style="margin:0; font-size:12px; color:#888;">ID TRANSMISI ANDA</p>
    <div id="display-id" class="id-badge">----</div>
    <select id="res" onchange="setupMedia()">
        <option value="720">Landscape 720p (Recommended)</option>
        <option value="1080">Landscape 1080p (High-End)</option>
    </select>
    <button class="btn btn-ghost" onclick="togglePreview()">HIDE UI / PREVIEW</button>
</div>

<div id="ui-op" class="overlay hidden">
    <h3 style="margin-top:0;">HUBUNGKAN KE CAM</h3>
    <input type="text" id="target-id" placeholder="Masukkan 4 Digit Kode" maxlength="4">
    <button class="btn btn-primary" id="btn-connect" onclick="connect()">CONNECT TO CAMERA</button>
</div>

<div id="video-container">
    <video id="v-out" autoplay playsinline muted></video>
</div>

<script>
    let peer = null, localStream = null, lastBytes = 0;
    const vOut = document.getElementById('v-out');
    const ice = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }, { urls: 'stun:stun1.l.google.com:19302' }] } };

    // 1. Inisialisasi Role
    async function initRole(role) {
        document.getElementById('menu').classList.add('hidden');
        if(role === 'cam') {
            const id = localStorage.getItem('dkv_ninja_id') || Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('dkv_ninja_id', id);
            document.getElementById('ui-cam').classList.remove('hidden');
            document.getElementById('display-id').innerText = id;
            document.getElementById('mon').classList.remove('hidden');
            
            peer = new Peer('dkv-' + id, ice);
            await setupMedia();
            
            peer.on('open', () => setStatus('Ready', '#3b82f6'));
            peer.on('call', call => {
                call.answer(localStream);
                setStatus('LIVE', '#ef4444');
                monitorStream(call.peerConnection, localStream);
            });
        } else {
            document.getElementById('ui-op').classList.remove('hidden');
            peer = new Peer(ice);
            vOut.muted = false; // Aktifkan suara di vMix
            peer.on('open', () => setStatus('Operator Ready', '#3b82f6'));
        }
        
        peer.on('error', err => {
            alert("Error: " + err.type + "\nPastikan ID tidak sedang dipakai.");
            location.reload();
        });
    }

    // 2. Setup Kamera & Audio
    async function setupMedia() {
        const h = document.getElementById('res').value;
        if(localStream) localStream.getTracks().forEach(t => t.stop());
        
        try {
            localStream = await navigator.mediaDevices.getUserMedia({
                video: { height: { ideal: parseInt(h) }, aspectRatio: 1.77 },
                audio: { echoCancellation: true, noiseSuppression: true }
            });
            vOut.srcObject = localStream;
            monitorStream(null, localStream); // Monitor audio sendiri
        } catch(e) {
            alert("Kamera diblokir! Gunakan HTTPS.");
        }
    }

    // 3. Fungsi Connect (Operator)
    function connect() {
        const tid = document.getElementById('target-id').value;
        if(!tid) return alert("Isi ID!");
        
        document.getElementById('btn-connect').innerText = "Connecting...";
        const call = peer.call('dkv-' + tid, new MediaStream());
        
        call.on('stream', remoteStream => {
            vOut.srcObject = remoteStream;
            document.getElementById('ui-op').classList.add('hidden');
            document.getElementById('mon').classList.remove('hidden');
            setStatus('CONNECTED', '#00ff88');
            monitorStream(call.peerConnection, remoteStream);
        });

        // Timeout Jika Gagal
        setTimeout(() => {
            if(document.getElementById('stat-text').innerText === 'Operator Ready') {
                alert("Sambungan Gagal. Pastikan ID Kameramen sudah aktif!");
                document.getElementById('btn-connect').innerText = "CONNECT TO CAMERA";
            }
        }, 8000);
    }

    // 4. Monitoring (Audio & Bitrate)
    function monitorStream(pc, stream) {
        // Audio Meter
        const aCtx = new AudioContext();
        const src = aCtx.createMediaStreamSource(stream);
        const ana = aCtx.createAnalyser();
        src.connect(ana);
        const data = new Uint8Array(ana.frequencyBinCount);

        function draw() {
            ana.getByteFrequencyData(data);
            let sum = data.reduce((a, b) => a + b, 0);
            document.getElementById('audio-bar').style.width = Math.min((sum/data.length)*2.5, 100) + "%";
            requestAnimationFrame(draw);
        }
        draw();

        // Speed Meter
        if(pc) {
            setInterval(async () => {
                const stats = await pc.getStats();
                stats.forEach(report => {
                    if(report.type === 'inbound-rtp' || report.type === 'outbound-rtp') {
                        if(report.kind === 'video') {
                            const b = report.bytesReceived || report.bytesSent;
                            const speed = Math.floor((b - lastBytes) * 8 / 1000);
                            document.getElementById('stat-speed').innerText = `Speed: ${speed} kbps`;
                            lastBytes = b;
                        }
                    }
                });
            }, 1000);
        }
    }

    function setStatus(txt, color) {
        document.getElementById('stat-text').innerText = txt;
        document.getElementById('dot').style.background = color;
    }

    function toggleMute() {
        vOut.muted = !vOut.muted;
        document.getElementById('btn-mute').innerText = vOut.muted ? "UNMUTE" : "MUTE AUDIO";
    }

    function togglePreview() {
        document.getElementById('ui-cam').classList.toggle('hidden');
    }
</script>
</body>
</html>
