<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>vMix Remote Cam - Auto Connect</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #111; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        #menu-utama { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; padding: 20px; }
        .btn { width: 100%; max-width: 300px; padding: 18px; font-size: 16px; font-weight: bold; border: none; border-radius: 12px; cursor: pointer; transition: 0.2s; }
        .btn-kameramen { background: #28a745; color: white; }
        .btn-operator { background: #007bff; color: white; }

        #area-kerja { display: none; position: relative; height: 100vh; width: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay-top { position: absolute; top: 0; left: 0; right: 0; padding: 15px; background: rgba(0,0,0,0.85); text-align: center; z-index: 10; border-bottom: 1px solid #333; }
        .id-display { font-size: 28px; color: #0f0; font-weight: bold; margin: 5px 0; font-family: monospace; }
        
        .action-box { display: flex; gap: 8px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .btn-small { padding: 10px 15px; font-size: 12px; border-radius: 6px; border: none; cursor: pointer; font-weight: bold; color: white; }
        .btn-wa { background: #25d366; }

        #res-selector { background: #444; color: white; border: 1px solid #666; padding: 8px; border-radius: 6px; font-size: 12px; }
    </style>
</head>
<body>

    <div id="menu-utama">
        <h2 style="letter-spacing: 2px;">LEMON REMOTE LIVE</h2>
        <button class="btn btn-kameramen" onclick="pilihMode('kameramen')">SAYA KAMERAMEN</button>
        <button class="btn btn-operator" onclick="pilihMode('operator')">SAYA OPERATOR VMIX</button>
    </div>

    <div id="area-kerja">
        <div class="overlay-top">
            <div id="status-text" style="font-size: 11px; color: #aaa;">Inisialisasi...</div>
            <div id="id-box" class="id-display">----</div>
            
            <div id="kameramen-tools" class="action-box" style="display: none;">
                <select id="res-selector" onchange="gantiResolusi()">
                    <option value="480">SD - 480p</option>
                    <option value="720" selected>HD - 720p</option>
                    <option value="1080">FHD - 1080p</option>
                </select>
                <button class="btn-small btn-wa" onclick="shareLinkWA()">KIRIM LINK LIVE KE WA</button>
            </div>
        </div>
        <video id="v-main" autoplay playsinline muted></video>
    </div>

    <script>
        const menu = document.getElementById('menu-utama');
        const kerja = document.getElementById('area-kerja');
        const video = document.getElementById('v-main');
        const status = document.getElementById('status-text');
        const idBox = document.getElementById('id-box');
        const kTools = document.getElementById('kameramen-tools');
        const resSelector = document.getElementById('res-selector');
        
        let stream;
        let peer;

        // Cek URL untuk Auto-Connect Operator
        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const autoId = urlParams.get('id');
            if (autoId) {
                pilihMode('operator', autoId);
            }
        };

        function pilihMode(mode, autoId = null) {
            menu.style.display = 'none';
            kerja.style.display = 'block';
            if(mode === 'kameramen') {
                kTools.style.display = 'flex';
                mulaiKamera();
                initPeer(true);
            } else {
                status.innerText = "Auto-Connecting to Camera...";
                initPeer(false, autoId);
            }
        }

        async function mulaiKamera() {
            if (stream) stream.getTracks().forEach(t => t.stop());
            const res = resSelector.value;
            let w = 1280, h = 720;
            if(res === "480") { w = 640; h = 480; }
            if(res === "1080") { w = 1920; h = 1080; }

            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: { ideal: w }, height: { ideal: h } },
                    audio: true
                });
                video.srcObject = stream;
                status.innerText = "Kamera Siap (" + res + "p)";
            } catch (err) { alert("Izin Kamera Ditolak!"); }
        }

        function gantiResolusi() { mulaiKamera(); }

        function initPeer(isKameramen, autoId = null) {
            peer = new Peer();
            peer.on('open', (id) => {
                if(isKameramen) {
                    idBox.innerText = id;
                } else if(autoId) {
                    hubungkanOtomatis(autoId);
                }
            });

            if(isKameramen) {
                peer.on('call', (call) => {
                    call.answer(stream);
                    status.innerText = "LIVE TERHUBUNG!";
                });
            }
        }

        function hubungkanOtomatis(tid) {
            const call = peer.call(tid, null);
            call.on('stream', (remStream) => {
                video.srcObject = remStream;
                video.muted = false;
                status.innerText = "LIVE DARI KAMERAMEN";
                idBox.innerText = "CONNECTED";
            });
        }

        function shareLinkWA() {
            const id = idBox.innerText;
            const baseURL = window.location.href.split('?')[0];
            const fullLink = `${baseURL}?id=${id}`;
            const text = encodeURIComponent("Klik link ini untuk melihat LIVE kamera saya di vMix: " + fullLink);
            window.open(`https://wa.me/?text=${text}`, '_blank');
        }
    </script>
</body>
</html>
