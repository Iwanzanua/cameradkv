<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>LemonBooth Full Screen View</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background-color: #000; 
        }

        /* Video memenuhi seluruh layar tanpa tombol apapun */
        #video {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 1;
        }

        /* Dropdown kamera tetap ada namun dibuat semi-transparan di pojok */
        /* Agar kamu tetap bisa pindah ke kamera belakang */
        #cameraSelect {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            background: rgba(0, 0, 0, 0.4);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 5px;
            border-radius: 5px;
            font-size: 12px;
            max-width: 150px;
            outline: none;
        }
    </style>
</head>
<body>

    <select id="cameraSelect">
        <option value="">Mencari Kamera...</option>
    </select>
    
    <video id="video" autoplay playsinline></video>

    <script>
        const video = document.getElementById('video');
        const cameraSelect = document.getElementById('cameraSelect');
        let currentStream;

        async function getDevices() {
            const devices = await navigator.mediaDevices.enumerateDevices();
            const videoDevices = devices.filter(device => device.kind === 'videoinput');
            
            cameraSelect.innerHTML = '';
            videoDevices.forEach((device, i) => {
                const option = document.createElement('option');
                option.value = device.deviceId;
                option.text = device.label || `Kamera ${i + 1}`;
                cameraSelect.appendChild(option);
            });
        }

        async function startCamera(deviceId) {
            if (currentStream) {
                currentStream.getTracks().forEach(track => track.stop());
            }

            const constraints = {
                video: {
                    deviceId: deviceId ? { exact: deviceId } : undefined,
                    facingMode: deviceId ? undefined : "environment", // Prioritas kamera belakang
                    width: { ideal: 1920 },
                    height: { ideal: 1080 }
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia(constraints);
                currentStream = stream;
                video.srcObject = stream;
                getDevices(); // Update label kamera setelah izin diberikan
            } catch (err) {
                console.error("Gagal akses kamera: ", err);
            }
        }

        cameraSelect.onchange = () => {
            startCamera(cameraSelect.value);
        };

        // Jalankan otomatis
        startCamera();
    </script>
</body>
</html>
