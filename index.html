<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DKV LIVE PRO</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
background:#000;
font-family:Arial;
overflow:hidden;
color:white;
}
video{
width:100%;
height:100vh;
object-fit:cover;
background:black;
}
.panel{
position:fixed;
top:20px;
left:20px;
z-index:10;
background:rgba(0,0,0,.7);
padding:15px;
border-radius:12px;
width:280px;
}
button,input{
width:100%;
padding:12px;
margin:5px 0;
font-size:18px;
border:none;
border-radius:8px;
}
button{
background:#00cc66;
color:white;
font-weight:bold;
}
input{
background:#222;
color:white;
}
#status{
margin-top:10px;
font-size:15px;
color:#00ff99;
}
</style>
</head>

<body>

<div class="panel">

<h2>DKV LIVE PRO</h2>

<button onclick="jadiKamera()">📷 Kamera HP</button>

<input id="room" placeholder="Masukkan ID Room">

<button onclick="jadiOperator()">🎬 Operator vMix</button>

<div id="status">READY</div>

</div>

<video id="video" autoplay playsinline muted></video>

<script>

let peer;
let localStream;
let reconnect;
const video = document.getElementById("video");
const status = document.getElementById("status");

const cfg = {
iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:global.stun.twilio.com:3478"}
]
};

function log(txt){
status.innerText=txt;
}

async function jadiKamera(){

try{

log("Mengaktifkan kamera...");

let id = Math.floor(Math.random()*9999).toString();

peer = new Peer("cam"+id,{config:cfg});

peer.on("open",()=>{

log("ID ROOM : "+id+" | Menunggu operator...");
alert("ID ROOM = "+id);

});

localStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:1280,
height:720
},
audio:true
});

video.srcObject = localStream;

peer.on("call",(call)=>{

log("Operator terhubung...");
call.answer(localStream);

});

}catch(e){
log("Gagal buka kamera");
}

}

function jadiOperator(){

let id=document.getElementById("room").value;

if(!id) return alert("Masukkan ID");

log("Menghubungkan...");

peer = new Peer({config:cfg});

peer.on("open",()=>{

const call = peer.call("cam"+id,new MediaStream());

call.on("stream",(stream)=>{

video.srcObject=stream;
video.muted=false;
log("CONNECTED ✅");

});

call.on("close",()=>{
log("Putus... reconnect...");
setTimeout(jadiOperator,3000);
});

call.on("error",()=>{
log("Gagal koneksi");
});

});

}

</script>

</body>
</html>
