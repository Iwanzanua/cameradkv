<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKV MUHLIBAT - AUTO CONNECT</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #000; color: #fff; text-align: center; margin: 0; }
        .box { padding: 20px; max-width: 400px; margin: 20px auto; background: #111; border-radius: 15px; border: 1px solid #333; }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 10px; transform: scaleX(-1); } /* Mirror preview */
        #remote-video { transform: scaleX(1); } /* vMix non-mirror */
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cam { background: #e74c3c; color: white; }
        .btn-op { background: #3498db; color: white; }
        .status { padding: 10px; margin: 10px 0; border-radius: 5px; font-size: 13px; font-weight: bold; }
        .online { background: #2ecc71; color: #000; }
        .offline { background: #e74c3c; color: #fff; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #444; background: #222; color: #fff; text-align: center; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="box">
    <h2>DKV CAM PRO</h2>
    <div id="status-box" class="status offline">SISTEM OFFLINE</div>

    <div id="menu">
        <button class="btn btn-cam" onclick="init('cam')">MULAI SEBAGAI KAMERAMEN</button>
        <button class="btn btn-op" onclick="init('op')">MULAI SEBAGAI OPERATOR</button>
    </div>

    <div id="ui-cam" style="display:none">
        <p>ID ANDA:</p>
        <h1 id="my-id" style="color: #2ecc71; margin: 0; font-size: 40px;">----</h1>
        <p style="font-size: 11px; color: #888;">Klik Stream dulu agar Operator bisa melihat</p>
        <button id="btn-stream" class="btn" style="background:#2ecc71; color:white;" onclick="toggleStream()">MULAI STREAMING</button>
        <video id="p-v" autoplay muted playsinline></video>
    </div>

    <div id="ui-op" style="display:none">
        <input type="text" id="t-id" placeholder="Masukkan ID Kameramen">
        <button id="btn-conn" class="btn btn-op" onclick="connect()">HUBUNGKAN KE VMIX</button>
        <video id="remote-video" autoplay playsinline></video>
    </div>
</div>

<script>
    let peer = null, localStream = null, isStream = false;

    // Config dengan banyak STUN server cadangan
    const peerConfig = {
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' },
                { urls: 'stun:global.stun.twilio.com:3478' }
            ],
            'iceTransportPolicy': 'all'
        }
    };

    async function init(role) {
        document.getElementById('menu').style.display = 'none';
        const stat = document.getElementById('status-box');

        if (role === 'cam') {
            document.getElementById('ui-cam').style.display = 'block';
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('my-id').innerText = id;
            
            peer = new Peer('dkv-' + id, peerConfig);
            
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "environment", height: 720 }, 
                    audio: true 
                });
                document.getElementById('p-v').srcObject = localStream;
                localStream.getTracks().forEach(t => t.enabled = false);
            } catch(e) { alert("HTTPS wajib aktif!"); }

            peer.on('open', () => {
                stat.innerText = "SIAP SIARAN";
                stat.className = "status online";
            });

            peer.on('call', call => {
                call.answer(localStream);
                stat.innerText = "SEDANG LIVE (VMIX)";
            });
        } else {
            document.getElementById('ui-op').style.display = 'block';
            peer = new Peer(peerConfig);
            peer.on('open', () => {
                stat.innerText = "OPERATOR AKTIF";
                stat.className = "status online";
            });
        }

        peer.on('error', err => {
            console.error(err);
            stat.innerText = "ERROR: " + err.type;
            stat.className = "status offline";
            if(err.type === 'peer-unavailable') alert("ID Tidak Ditemukan! Pastikan Kameramen sudah standby.");
        });
    }

    function toggleStream() {
        isStream = !isStream;
        localStream.getTracks().forEach(t => t.enabled = isStream);
        const btn = document.getElementById('btn-stream');
        btn.innerText = isStream ? "STOP STREAM (LIVE)" : "MULAI STREAMING";
        btn.style.background = isStream ? "#e74c3c" : "#2ecc71";
    }

    function connect() {
        const tid = document.getElementById('t-id').value;
        const btn = document.getElementById('btn-conn');
        btn.innerText = "MENGHUBUNGKAN...";
        
        // Panggil peer dkv-XXXX
        const call = peer.call('dkv-' + tid, new MediaStream());
        
        call.on('stream', stream => {
            document.getElementById('remote-video').srcObject = stream;
            document.getElementById('status-box').innerText = "VIDEO DITERIMA";
            btn.innerText = "TERHUBUNG!";
        });

        // Auto retry jika dalam 5 detik tidak ada video
        setTimeout(() => {
            if(!document.getElementById('remote-video').srcObject && btn.innerText === "MENGHUBUNGKAN...") {
                btn.innerText = "GAGAL! COBA LAGI";
                console.log("Koneksi gagal, coba periksa ID.");
            }
        }, 8000);
    }
</script>
</body>
</html>
