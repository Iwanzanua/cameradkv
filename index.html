<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKV LOCAL TEST</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: #fff; text-align: center; }
        .container { padding: 20px; max-width: 400px; margin: auto; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #222; }
        .btn { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cam { background: #e74c3c; color: white; }
        .btn-op { background: #3498db; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; text-align: center; box-sizing: border-box; }
        #log { font-size: 11px; color: #888; text-align: left; background: #111; padding: 10px; height: 100px; overflow-y: scroll; margin-top: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>DKV LOCAL TEST</h2>
    <div id="menu">
        <button class="btn btn-cam" onclick="init('cam')">KAMERAMEN</button>
        <button class="btn btn-op" onclick="init('op')">OPERATOR</button>
    </div>

    <div id="ui-cam" style="display:none">
        <p>ID ANDA:</p>
        <h1 id="my-id" style="color: #2ecc71;">----</h1>
        <button class="btn" style="background:#2ecc71; color:white;" onclick="toggleStream()">START/STOP STREAM</button>
        <video id="p-v" autoplay muted playsinline></video>
    </div>

    <div id="ui-op" style="display:none">
        <input type="text" id="t-id" placeholder="Masukkan ID">
        <button class="btn btn-op" onclick="connect()">HUBUNGKAN</button>
        <video id="r-v" autoplay playsinline></video>
    </div>

    <div id="log">Sistem Siap...</div>
</div>

<script>
    let peer = null, localStream = null, isStream = false;

    function addLog(msg) {
        const log = document.getElementById('log');
        log.innerHTML += `> ${msg}<br>`;
        log.scrollTop = log.scrollHeight;
    }

    async function init(role) {
        document.getElementById('menu').style.display = 'none';
        // Menggunakan STUN Google saja untuk testing awal
        const cfg = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };

        if (role === 'cam') {
            document.getElementById('ui-cam').style.display = 'block';
            const id = Math.floor(1000 + Math.random() * 9000).toString();
            document.getElementById('my-id').innerText = id;
            
            peer = new Peer('dkv-' + id, cfg);
            localStream = await navigator.mediaDevices.getUserMedia({ video: {facingMode: "environment"}, audio: true });
            document.getElementById('p-v').srcObject = localStream;
            localStream.getTracks().forEach(t => t.enabled = false);

            peer.on('open', () => addLog("ID Terdaftar: dkv-" + id));
            peer.on('call', call => {
                addLog("Menerima Panggilan...");
                call.answer(localStream);
                addLog("Streaming Berjalan.");
            });
        } else {
            document.getElementById('ui-op').style.display = 'block';
            peer = new Peer(cfg);
            peer.on('open', () => addLog("Operator Siap."));
        }

        peer.on('error', err => addLog("ERROR: " + err.type));
    }

    function toggleStream() {
        isStream = !isStream;
        localStream.getTracks().forEach(t => t.enabled = isStream);
        addLog(isStream ? "Stream ON" : "Stream OFF");
    }

    function connect() {
        const tid = document.getElementById('t-id').value;
        addLog("Menghubungi dkv-" + tid + "...");
        const call = peer.call('dkv-' + tid, new MediaStream());
        
        call.on('stream', stream => {
            addLog("Video Diterima!");
            document.getElementById('r-v').srcObject = stream;
        });

        setTimeout(() => {
            if(!document.getElementById('r-v').srcObject) {
                addLog("Timeout: Coba Refresh & Pastikan Kameramen sudah START STREAM.");
            }
        }, 5000);
    }
</script>
</body>
</html>
