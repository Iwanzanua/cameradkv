<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DKV Muhlibat - Internet Cam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding: 20px; }
        .box { max-width: 400px; margin: auto; background: #222; padding: 20px; border-radius: 15px; border: 1px solid #333; }
        video { width: 100%; border-radius: 10px; margin-top: 10px; background: #000; }
        .id-text { font-size: 3rem; color: #2ecc71; font-weight: bold; margin: 10px 0; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-red { background: #e74c3c; color: white; }
        .btn-blue { background: #3498db; color: white; }
        select, input { width: 90%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        #status { font-size: 0.9rem; color: #f1c40f; min-height: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>DKV MUHLIBAT v2</h2>
    <div id="status">Menginisialisasi...</div>

    <div id="menu">
        <button class="btn btn-red" onclick="initPeer('cam')">MULAI KAMERAMEN</button>
        <button class="btn btn-blue" onclick="initPeer('op')">MULAI OPERATOR (VMIX)</button>
    </div>

    <div id="ui-cam" style="display:none">
        <p>ID KAMERA ANDA:</p>
        <div id="display-id" class="id-text">----</div>
        <select id="res" onchange="startStream()">
            <option value="720">HD 720p (Stabil)</option>
            <option value="1080">Full HD 1080p (Butuh Sinyal Kuat)</option>
            <option value="480">SD 480p (Hemat Kuota)</option>
        </select>
        <video id="preview" autoplay muted playsinline></video>
        <p style="font-size: 0.7rem; color: #888;">ID ini akan tetap sama di HP ini meskipun direfresh.</p>
    </div>

    <div id="ui-op" style="display:none">
        <input type="text" id="input-id" placeholder="Masukkan 4 Digit Kode" maxlength="4">
        <button class="btn btn-blue" onclick="connectToCam()">HUBUNGKAN SEKARANG</button>
        <video id="remote-view" autoplay playsinline></video>
    </div>
</div>

<script>
    let peer = null;
    let myStream = null;
    
    // Konfigurasi Server Biar Bisa Tembus Internet (STUN Server Google)
    const peerConfig = {
        config: {
            'iceServers': [
                { urls: 'stun:stun.l.google.com:19302' },
                { urls: 'stun:stun1.l.google.com:19302' },
                { urls: 'stun:stun2.l.google.com:19302' }
            ],
            'sdpSemantics': 'unified-plan'
        }
    };

    function getPersistentID() {
        let id = localStorage.getItem('dkv_id');
        if (!id) {
            id = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('dkv_id', id);
        }
        return id;
    }

    function initPeer(role) {
        const id = getPersistentID();
        document.getElementById('menu').style.display = 'none';
        
        if (role === 'cam') {
            document.getElementById('ui-cam').style.display = 'block';
            document.getElementById('display-id').innerText = id;
            peer = new Peer('dkv-muhlibat-' + id, peerConfig);
            startStream();
            
            peer.on('open', () => document.getElementById('status').innerText = "Kamera Siap! Tunggu Operator...");
            peer.on('call', call => {
                document.getElementById('status').innerText = "LIVE! Sedang Mengirim Gambar...";
                call.answer(myStream);
            });
        } else {
            document.getElementById('ui-op').style.display = 'block';
            peer = new Peer(peerConfig);
            peer.on('open', () => document.getElementById('status').innerText = "Operator Siap. Masukkan ID Kamera.");
        }

        peer.on('error', err => {
            console.error(err);
            document.getElementById('status').innerText = "Error: " + err.type;
            if(err.type === 'unavailable-id') alert("ID sedang digunakan, coba lagi nanti.");
        });
    }

    async function startStream() {
        const h = document.getElementById('res').value;
        const constraints = { 
            video: { height: parseInt(h), facingMode: "environment" }, 
            audio: true 
        };
        
        try {
            if (myStream) myStream.getTracks().forEach(t => t.stop());
            myStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('preview').srcObject = myStream;
        } catch (e) {
            alert("Akses Kamera Ditolak! Pastikan gunakan HTTPS.");
        }
    }

    function connectToCam() {
        const targetId = document.getElementById('input-id').value;
        document.getElementById('status').innerText = "Menghubungkan ke " + targetId + "...";
        
        const call = peer.call('dkv-muhlibat-' + targetId, new MediaStream());
        
        call.on('stream', remoteStream => {
            document.getElementById('status').innerText = "Terhubung!";
            document.getElementById('remote-view').srcObject = remoteStream;
        });

        setTimeout(() => {
            if (document.getElementById('status').innerText.includes("Menghubungkan")) {
                document.getElementById('status').innerText = "Koneksi Lambat... Pastikan HP Kameramen sudah buka web.";
            }
        }, 5000);
    }
</script>
</body>
</html>
