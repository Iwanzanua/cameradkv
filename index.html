<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lemon Live Turbo</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #000; color: white; font-family: sans-serif; overflow: hidden; }
        #v-main { position: absolute; width: 100%; height: 100%; object-fit: cover; z-index: 1; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; padding: 15px; background: rgba(0,0,0,0.7); text-align: center; z-index: 10; }
        .btn-wa { background: #25d366; color: white; border: none; padding: 12px; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; width: 100%; max-width: 250px; }
        #menu { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 20px; z-index: 20; position: relative; background: #111; }
        .btn-mode { width: 280px; padding: 20px; border-radius: 15px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; }
    </style>
</head>
<body>

    <div id="menu">
        <button class="btn-mode" style="background:#28a745; color:white;" onclick="pilih('kameramen')">MULAI KAMERAMEN</button>
        <button class="btn-mode" style="background:#007bff; color:white;" onclick="pilih('operator')">MODE OPERATOR (MANUAL)</button>
    </div>

    <div id="app" style="display:none;">
        <div class="overlay">
            <div id="stat" style="font-size:12px; color:#aaa;">Inisialisasi...</div>
            <div id="id-box" style="font-size:24px; color:#0f0; font-weight:bold; margin:5px 0;">----</div>
            <button id="wa-btn" class="btn-wa" style="display:none;" onclick="shareWA()">KIRIM LINK KE VMIX</button>
        </div>
        <video id="v-main" autoplay playsinline muted></video>
    </div>

    <script>
        const video = document.getElementById('v-main');
        const stat = document.getElementById('stat');
        const idBox = document.getElementById('id-box');
        let stream, peer;

        // Cek URL Otomatis
        const urlParams = new URLSearchParams(window.location.search);
        const autoId = urlParams.get('id');
        if (autoId) pilih('operator', autoId);

        function pilih(mode, aid = null) {
            document.getElementById('menu').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            if (mode === 'kameramen') {
                document.getElementById('wa-btn').style.display = 'inline-block';
                startCam().then(() => initPeer(true));
            } else {
                initPeer(false, aid);
            }
        }

        async function startCam() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 640, height: 480 },
                    audio: true
                });
                video.srcObject = stream;
            } catch (e) { alert("Izinkan Kamera!"); }
        }

        function initPeer(isKam, aid = null) {
            peer = new Peer({ config: {'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] }});
            
            peer.on('open', (id) => {
                if(isKam) {
                    idBox.innerText = id;
                    stat.innerText = "SIAP KIRIM";
                } else if(aid) {
                    tryConnect(aid);
                }
            });

            if(isKam) {
                peer.on('call', (call) => {
                    call.answer(stream);
                    stat.innerText = "LIVE TERHUBUNG!";
                    idBox.innerText = "STREAMING...";
                });
            }
        }

        function tryConnect(tid) {
            stat.innerText = "Mencoba Menghubungkan...";
            const call = peer.call(tid, null);
            
            // Timeout jika 5 detik tidak respon, coba lagi
            const timer = setTimeout(() => {
                if (stat.innerText !== "LIVE DARI HP") {
                    console.log("Retry...");
                    tryConnect(tid);
                }
            }, 3000);

            call.on('stream', (rem) => {
                clearTimeout(timer);
                video.srcObject = rem;
                video.muted = false;
                stat.innerText = "LIVE DARI HP";
                idBox.innerText = "CONNECTED";
            });

            call.on('error', () => { tryConnect(tid); });
        }

        function shareWA() {
            const link = window.location.href.split('?')[0] + "?id=" + idBox.innerText;
            window.open(`https://wa.me/?text=${encodeURIComponent("LIVE VMIX: "+link)}`, '_blank');
        }
    </script>
</body>
</html>
