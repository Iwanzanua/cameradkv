<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKV Muhlibat - Cam Fix</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 15px; }
        .hidden { display: none; }
        .container { max-width: 500px; margin: auto; background: #1e1e1e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        video { width: 100%; border-radius: 10px; background: #000; margin-top: 15px; border: 2px solid #333; }
        .btn { padding: 12px 20px; margin: 8px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; width: 100%; max-width: 250px; transition: 0.3s; }
        .btn-cam { background: #e74c3c; color: white; }
        .btn-op { background: #3498db; color: white; }
        .btn-reset { background: #555; color: #ccc; font-size: 10px; margin-top: 20px; }
        input, select { padding: 12px; border-radius: 8px; border: 1px solid #333; background: #252525; color: white; margin-bottom: 10px; width: 80%; }
        #status { font-weight: bold; color: #f1c40f; margin: 15px 0; font-size: 14px; }
        .id-display { font-size: 40px; font-weight: 800; color: #2ecc71; letter-spacing: 5px; margin: 10px 0; }
    </style>
</head>
<body>

<div class="container">
    <h2>DKV MUHLIBAT</h2>
    <div id="status">Sistem Kamera Wireless</div>

    <div id="menu">
        <button class="btn btn-cam" onclick="startKameramen()">MODE KAMERAMEN</button>
        <button class="btn btn-op" onclick="startOperator()">MODE OPERATOR (vMix)</button>
    </div>

    <div id="ui-kameramen" class="hidden">
        <p>ID Kamera Anda (Statik):</p>
        <div id="my-id" class="id-display">----</div>
        
        <select id="res" onchange="applyResolution()">
            <option value="720">Resolusi: HD 720p</option>
            <option value="1080">Resolusi: Full HD 1080p</option>
            <option value="480">Resolusi: SD 480p</option>
        </select>
        
        <video id="preview" autoplay muted playsinline></video>
        <button class="btn btn-reset" onclick="resetID()">Ganti ID Baru</button>
    </div>

    <div id="ui-operator" class="hidden">
        <input type="text" id="target-id" placeholder="Masukkan 4 Digit ID" maxlength="4">
        <button class="btn btn-op" onclick="connectToCam()">HUBUNGKAN KE VMIX</button>
        <video id="remote-video" autoplay playsinline></video>
    </div>
</div>

<script>
    let peer = null;
    let localStream = null;

    // Fungsi mendapatkan atau membuat ID unik untuk HP ini
    function getPersistentId() {
        let storedId = localStorage.getItem('muhlibat_cam_id');
        if (!storedId) {
            storedId = Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('muhlibat_cam_id', storedId);
        }
        return storedId;
    }

    function resetID() {
        if(confirm("Yakin ingin mengganti ID? ID lama tidak bisa dipakai lagi.")) {
            localStorage.removeItem('muhlibat_cam_id');
            location.reload();
        }
    }

    // --- LOGIKA KAMERAMEN ---
    async function startKameramen() {
        const shortId = getPersistentId();
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('ui-kameramen').classList.remove('hidden');
        document.getElementById('my-id').innerText = shortId;
        document.getElementById('status').innerText = "Status: Menunggu Operator...";

        // Inisialisasi Peer dengan ID statik
        peer = new Peer('dkv-' + shortId);

        await applyResolution();

        peer.on('call', (call) => {
            document.getElementById('status').innerText = "Status: LIVE (Tersambung)";
            call.answer(localStream);
        });

        peer.on('error', (err) => {
            if(err.type === 'unavailable-id') {
                alert("ID sudah digunakan! Klik Reset ID.");
            }
        });
    }

    async function applyResolution() {
        const h = document.getElementById('res').value;
        const w = h == "1080" ? 1920 : (h == "720" ? 1280 : 854);
        
        const constraints = {
            video: { 
                width: { ideal: parseInt(w) }, 
                height: { ideal: parseInt(h) }, 
                facingMode: "environment" 
            },
            audio: true
        };

        try {
            if(localStream) {
                localStream.getTracks().forEach(track => track.stop());
            }
            localStream = await navigator.mediaDevices.getUserMedia(constraints);
            document.getElementById('preview').srcObject = localStream;
        } catch (err) {
            console.error(err);
            alert("Gagal akses kamera. Pastikan menggunakan HTTPS.");
        }
    }

    // --- LOGIKA OPERATOR ---
    function startOperator() {
        document.getElementById('menu').classList.add('hidden');
        document.getElementById('ui-operator').classList.remove('hidden');
        document.getElementById('status').innerText = "Mode: Penerima vMix";
        peer = new Peer(); 
    }

    function connectToCam() {
        const code = document.getElementById('target-id').value;
        document.getElementById('status').innerText = "Menyambungkan ke " + code + "...";
        
        // Memanggil ID statik dkv-XXXX
        const call = peer.call('dkv-' + code, new MediaStream());
        
        call.on('stream', (remoteStream) => {
            document.getElementById('remote-video').srcObject = remoteStream;
            document.getElementById('status').innerText = "Status: Menerima Gambar";
        });
    }
</script>
</body>
</html>
