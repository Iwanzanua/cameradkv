<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DKV MUHLIBAT - Monitor Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #000; color: white; margin: 0; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        .hidden { display: none !important; }
        video { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; object-fit: cover; z-index: 1; }
        
        .ui-panel { position: relative; z-index: 10; background: rgba(20, 20, 20, 0.95); padding: 25px; border-radius: 15px; width: 300px; text-align: center; border: 1px solid #444; }
        .id-display { font-size: 50px; font-weight: bold; color: #2ecc71; margin: 10px 0; }
        .btn { width: 100%; padding: 15px; margin: 10px 0; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .btn-cam { background: #e74c3c; color: white; }
        .btn-op { background: #3498db; color: white; }
        input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; background: #333; color: white; border: none; box-sizing: border-box; }

        /* Monitor Overlay (Speed & Audio) */
        #monitor-overlay {
            position: fixed; bottom: 20px; left: 20px; z-index: 20;
            background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;
            pointer-events: none; min-width: 150px;
        }
        .speed-text { font-size: 14px; font-family: monospace; color: #00ff00; margin-bottom: 5px; }
        
        /* Audio Bar Styles */
        .audio-container { width: 100%; height: 10px; background: #333; border-radius: 5px; overflow: hidden; }
        #audio-bar { width: 0%; height: 100%; background: linear-gradient(to right, #2ecc71, #f1c40f, #e74c3c); transition: width 0.1s; }
    </style>
</head>
<body>

<div id="monitor-overlay" class="hidden">
    <div class="speed-text" id="stat-bitrate">Speed: 0 kbps</div>
    <div class="audio-container">
        <div id="audio-bar"></div>
    </div>
</div>

<div id="menu" class="ui-panel">
    <h3>DKV MUHLIBAT</h3>
    <button class="btn btn-cam" onclick="startRole('cam')">KAMERAMEN (HP)</button>
    <button class="btn btn-op" onclick="startRole('op')">OPERATOR (VMIX)</button>
</div>

<div id="ui-cam" class="ui-panel hidden">
    <p>ID KAMERA ANDA:</p>
    <div id="display-id" class="id-display">----</div>
    <select id="res" onchange="setupCamera()"><option value="720">720p</option><option value="1080">1080p</option></select>
    <button class="btn btn-cam" onclick="document.getElementById('ui-cam').classList.add('hidden')">PREVIEW MODE</button>
</div>

<div id="ui-op" class="ui-panel hidden">
    <h3>INPUT KODE</h3>
    <input type="text" id="target-id" placeholder="4 Digit" maxlength="4">
    <button class="btn btn-op" onclick="connectToCam()">HUBUNGKAN</button>
</div>

<video id="main-video" autoplay playsinline muted></video>

<script>
    let peer = null, localStream = null, lastBytes = 0, speedInterval = null;
    const videoEl = document.getElementById('main-video');

    async function startRole(role) {
        document.getElementById('menu').classList.add('hidden');
        const ice = { config: { 'iceServers': [{ urls: 'stun:stun.l.google.com:19302' }] } };

        if (role === 'cam') {
            let id = localStorage.getItem('dkv_id') || Math.floor(1000 + Math.random() * 9000).toString();
            localStorage.setItem('dkv_id', id);
            document.getElementById('ui-cam').classList.remove('hidden');
            document.getElementById('display-id').innerText = id;
            peer = new Peer('dkv-' + id, ice);
            await setupCamera();
            peer.on('call', call => call.answer(localStream));
        } else {
            document.getElementById('ui-op').classList.remove('hidden');
            peer = new Peer(ice);
            videoEl.muted = false; 
        }
    }

    async function setupCamera() {
        const h = document.getElementById('res').value;
        if (localStream) localStream.getTracks().forEach(t => t.stop());
        localStream = await navigator.mediaDevices.getUserMedia({ video: { height: parseInt(h), facingMode: "environment" }, audio: true });
        videoEl.srcObject = localStream;
    }

    function connectToCam() {
        const id = document.getElementById('target-id').value;
        const call = peer.call('dkv-' + id, new MediaStream());
        
        call.on('stream', remoteStream => {
            videoEl.srcObject = remoteStream;
            document.getElementById('ui-op').classList.add('hidden');
            document.getElementById('monitor-overlay').classList.remove('hidden');
            startMonitoring(call.peerConnection, remoteStream);
        });
    }

    // Fungsi Monitor Kecepatan (Bitrate) & Audio Bar
    function startMonitoring(pc, stream) {
        // Audio Visualizer
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const source = audioCtx.createMediaStreamSource(stream);
        const analyzer = audioCtx.createAnalyser();
        analyzer.fftSize = 256;
        source.connect(analyzer);
        const dataArray = new Uint8Array(analyzer.frequencyBinCount);

        function updateAudio() {
            analyzer.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<dataArray.length; i++) sum += dataArray[i];
            let average = sum / dataArray.length;
            document.getElementById('audio-bar').style.width = Math.min(average * 2, 100) + "%";
            requestAnimationFrame(updateAudio);
        }
        updateAudio();

        // Speed/Bitrate Monitor
        speedInterval = setInterval(async () => {
            const stats = await pc.getStats();
            stats.forEach(report => {
                if (report.type === 'inbound-rtp' && report.kind === 'video') {
                    const bytes = report.bytesReceived;
                    if (lastBytes) {
                        const bitrate = Math.floor((bytes - lastBytes) * 8 / 1000);
                        document.getElementById('stat-bitrate').innerText = `Speed: ${bitrate} kbps`;
                    }
                    lastBytes = bytes;
                }
            });
        }, 1000);
    }
</script>
</body>
</html>
