<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>DKV Live Cam</title>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<style>
body{
margin:0;
background:#000;
color:white;
font-family:arial;
text-align:center;
}
video{
width:100%;
height:100vh;
object-fit:cover;
background:black;
}
.box{
position:fixed;
top:20px;
left:20px;
z-index:10;
background:rgba(0,0,0,.7);
padding:15px;
border-radius:10px;
}
button,input{
padding:10px;
margin:5px;
font-size:18px;
}
</style>
</head>

<body>

<div class="box" id="menu">
<h2>DKV LIVE</h2>

<button onclick="startCam()">Kamera HP</button>
<br>
<input id="room" placeholder="ID Room">
<button onclick="joinRoom()">Operator/vMix</button>
</div>

<video id="video" autoplay playsinline muted></video>

<script>

let peer;
let localStream;
let roomID="";

const config = {
iceServers:[
{urls:"stun:stun.l.google.com:19302"},
{urls:"stun:global.stun.twilio.com:3478"},
{
urls:"turn:openrelay.metered.ca:80",
username:"openrelayproject",
credential:"openrelayproject"
}
]
};

async function startCam(){

roomID = Math.floor(Math.random()*9999).toString();

alert("ID ROOM : "+roomID);

peer = new Peer(roomID,{config});

localStream = await navigator.mediaDevices.getUserMedia({
video:{
facingMode:"environment",
width:1280,
height:720
},
audio:true
});

video.srcObject = localStream;

peer.on("call",(call)=>{
call.answer(localStream);
});

}

function joinRoom(){

roomID=document.getElementById("room").value;

peer = new Peer({config});

peer.on("open",()=>{

const call = peer.call(roomID,new MediaStream());

call.on("stream",(stream)=>{
video.srcObject=stream;
video.muted=false;
});

call.on("close",()=>{
setTimeout(joinRoom,3000);
});

});

}

</script>
</body>
</html>
