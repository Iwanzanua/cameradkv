<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>vMix Remote Cam</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { width: 100%; height: 100%; background: #111; color: white; font-family: sans-serif; }
        
        /* Menu Pilihan Utama */
        #menu-utama {
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; gap: 20px; padding: 20px; text-align: center;
        }
        .btn-pilih {
            width: 100%; max-width: 300px; padding: 20px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 10px; cursor: pointer; transition: 0.3s;
        }
        .btn-kameramen { background: #28a745; color: white; }
        .btn-operator { background: #007bff; color: white; }

        /* Area Kamera (Kameramen & Operator) */
        #area-kerja { display: none; position: relative; height: 100vh; width: 100%; background: #000; }
        video { width: 100%; height: 100%; object-fit: cover; }
        
        .overlay-status {
            position: absolute; top: 0; left: 0; right: 0; padding: 15px;
            background: rgba(0,0,0,0.8); text-align: center; z-index: 10;
        }
        .id-box { font-size: 24px; color: #0f0; font-weight: bold; margin-top: 5px; letter-spacing: 2px; }

        /* Panel Input Operator */
        #panel-operator {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            width: 90%; max-width: 400px; background: rgba(255,255,255,0.1);
            padding: 20px; border-radius: 15px; backdrop-filter: blur(10px); z-index: 20;
        }
        input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 5px; border: none; font-size: 18px; text-align: center; }
    </style>
</head>
<body>

    <div id="menu-utama">
        <h1>Remote Cam vMix</h1>
        <p>Pilih peran kamu saat ini:</p>
        <button class="btn-pilih btn-kameramen" onclick="mulaiKameramen()">SAYA KAMERAMEN</button>
        <button class="btn-pilih btn-operator" onclick="mulaiOperator()">SAYA OPERATOR VMIX</button>
    </div>

    <div id="area-kerja">
        <div class="overlay-status">
            <div id="status-info">Inisialisasi...</div>
            <div id="display-id" class="id-box">----</div>
        </div>

        <video id="video-display" autoplay playsinline muted></video>

        <div id="panel-operator" style="display: none;">
            <input type="text" id="input-id-hp" placeholder="KETIK ID HP DISINI">
            <button class="btn-pilih btn-operator" style="padding: 10px;" onclick="hubungkanKeKameramen()">CONNECT TO CAMERA</button>
        </div>
    </div>

    <script>
        const menuUtama = document.getElementById('menu-utama');
        const areaKerja = document.getElementById('area-kerja');
        const videoElemen = document.getElementById('video-display');
        const statusInfo = document.getElementById('status-info');
        const displayId = document.getElementById('display-id');
        const panelOperator = document.getElementById('panel-operator');
        
        let localStream;
        let peer;

        // FUNGSI KAMERAMEN
        async function mulaiKameramen() {
            menuUtama.style.display = 'none';
            areaKerja.style.display = 'block';
            statusInfo.innerText = "Membuka Kamera...";

            try {
                localStream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "environment", width: 1280, height: 720 },
                    audio: true
                });
                videoElemen.srcObject = localStream;
                statusInfo.innerText = "Mencari ID di Server...";
                
                initPeerConnection(true); // true = sebagai kameramen
            } catch (err) {
                alert("Gagal buka kamera. Pastikan klik ALLOW!");
                location.reload();
            }
        }

        // FUNGSI OPERATOR
        function mulaiOperator() {
            menuUtama.style.display = 'none';
            areaKerja.style.display = 'block';
            panelOperator.style.display = 'block';
            statusInfo.innerText = "Siap Menghubungkan";
            displayId.innerText = "VMIX MODE";
            
            initPeerConnection(false);
        }

        // INISIALISASI PEERJS
        function initPeerConnection(isKameramen) {
            peer = new Peer();

            peer.on('open', (id) => {
                if(isKameramen) {
                    statusInfo.innerText = "KASIH ID INI KE OPERATOR:";
                    displayId.innerText = id;
                }
            });

            if(isKameramen) {
                // Menunggu panggilan dari vMix
                peer.on('call', (call) => {
                    call.answer(localStream);
                    statusInfo.innerText = "TERHUBUNG KE VMIX!";
                });
            }

            peer.on('error', (err) => {
                console.error(err);
                statusInfo.innerText = "Error: " + err.type;
            });
        }

        // LOGIKA OPERATOR MEMANGGIL HP
        function hubungkanKeKameramen() {
            const targetId = document.getElementById('input-id-hp').value;
            if(!targetId) return alert("Isi ID-nya dulu!");

            statusInfo.innerText = "Menghubungkan ke " + targetId + "...";
            
            // Operator memanggil HP (tanpa kirim video, hanya terima)
            const call = peer.call(targetId, null); 
            
            call.on('stream', (remoteStream) => {
                videoElemen.srcObject = remoteStream;
                videoElemen.muted = false; // Agar suara dari HP terdengar di vMix
                statusInfo.innerText = "LIVE DARI KAMERAMEN";
                panelOperator.style.display = 'none';
            });
        }
    </script>
</body>
</html>
